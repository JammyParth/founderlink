spring:
  cloud:
    config:
      enabled: false
  config:
    import: ""
  datasource:
    url: jdbc:h2:mem:user-service-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  cache:
    type: none

eureka:
  client:
    enabled: false

internal:
  secret: test-internal-secret
